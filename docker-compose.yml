version: '3.9'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "15191:15191"
    depends_on:
      - backend

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install poetry && poetry install && poetry run uvicorn app.main:app --host 0.0.0.0 --port 18000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "18000:18000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
